<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analista de Riesgo - Emprendedores México</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .semaforo-verde { background-color: #22c55e; }
        .semaforo-amarillo { background-color: #eab308; }
        .semaforo-rojo { background-color: #ef4444; }
    </style>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-6 text-blue-800">Analista de Riesgo: Importación y Venta (México)</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block font-medium">Costo del Producto (Unitario CNY/USD):</label>
                <input type="number" id="costoProducto" class="w-full border p-2 rounded mb-3" placeholder="0.00">
                
                <label class="block font-medium">Costo de Envío a México (Total):</label>
                <input type="number" id="costoEnvio" class="w-full border p-2 rounded mb-3" placeholder="0.00">
                
                <label class="block font-medium">Unidades a comprar:</label>
                <input type="number" id="unidades" class="w-full border p-2 rounded mb-3" placeholder="1">
            </div>

            <div>
                <label class="block font-medium">Precio de Venta Sugerido (MXN):</label>
                <input type="number" id="precioVenta" class="w-full border p-2 rounded mb-3" placeholder="0.00">
                
                <label class="block font-medium">¿Requiere NOM específica?</label>
                <select id="nomRequerida" class="w-full border p-2 rounded mb-3">
                    <option value="0">No (Etiquetado general NOM-050)</option>
                    <option value="5000">Sí (Certificación compleja / Salud)</option>
                </select>
            </div>
        </div>

        <button onclick="calcularRiesgo()" class="w-full bg-blue-600 text-white font-bold py-3 rounded mt-4 hover:bg-blue-700">
            ANALIZAR VIABILIDAD
        </button>

        <div id="resultado" class="hidden mt-8 p-6 rounded-lg border">
            <h2 class="text-xl font-bold mb-4">Resultado del Análisis</h2>
            <div id="semaforo" class="h-4 w-full rounded mb-4"></div>
            <div id="detalles" class="space-y-2">
                </div>
        </div>
    </div>

    <script>
        function calcularRiesgo() {
            // 1. Obtener valores
            const costoProd = parseFloat(document.getElementById('costoProducto').value) || 0;
            const envio = parseFloat(document.getElementById('costoEnvio').value) || 0;
            const unidades = parseInt(document.getElementById('unidades').value) || 1;
            const precioV = parseFloat(document.getElementById('precioVenta').value) || 0;
            const costoNOM = parseFloat(document.getElementById('nomRequerida').value);

            // 2. Cálculos Fiscales México (Simulación básica)
            const inversionTotal = (costoProd * unidades) + envio + costoNOM;
            const costoUnitarioFinal = inversionTotal / unidades;
            
            // Impuestos y Comisiones (Promedio Mercado Libre/Amazon 15%)
            const comisionMarketplace = precioV * 0.15;
            const ivaVenta = precioV * 0.16;
            const retencionISR = precioV * 0.01; // Retención plataforma tecnológica
            
            const utilidadNeta = precioV - costoUnitarioFinal - comisionMarketplace - ivaVenta - retencionISR;
            const margen = (utilidadNeta / precioV) * 100;

            // 3. Mostrar Resultados
            document.getElementById('resultado').classList.remove('hidden');
            const semaforo = document.getElementById('semaforo');
            const detalles = document.getElementById('detalles');

            let color = '';
            let mensaje = '';

            if (margen > 30) {
                color = 'semaforo-verde';
                mensaje = "¡Excelente viabilidad! El margen supera el 30%.";
            } else if (margen > 10) {
                color = 'semaforo-amarillo';
                mensaje = "Riesgo Moderado. Margen ajustado, revisa costos operativos.";
            } else {
                color = 'semaforo-rojo';
                mensaje = "Alto Riesgo. Margen muy bajo o negativo tras impuestos del SAT.";
            }

            semaforo.className = `h-4 w-full rounded mb-4 ${color}`;
            detalles.innerHTML = `
                <p><strong>Inversión por unidad:</strong> $${costoUnitarioFinal.toFixed(2)} MXN</p>
                <p><strong>Utilidad Estimada:</strong> $${utilidadNeta.toFixed(2)} MXN</p>
                <p><strong>Margen de Ganancia:</strong> ${margen.toFixed(2)}%</p>
                <p class="mt-4 font-bold">${mensaje}</p>
                <hr>
                <p class="text-sm text-gray-600 italic">*Incluye estimación de IVA, ISR y comisión de Marketplace.</p>
            `;
        }
    </script>
</body>
</html>
